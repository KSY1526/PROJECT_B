title: "KSY1526"
description: "개발 이야기를 기록합니다"
url: "https://KSY1526.github.io"
baseurl: "/project_b"
author:
  name: "KSY1526"
  github: "KSY1526"

# 빌드 설정
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# 플러그인
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# 페이지네이션
paginate: 10
paginate_path: "/page/:num/"

# 제외 파일
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - src/
  - output/
  - venv/

# Giscus 댓글 설정
# 아래 값은 https://giscus.app 에서 본인 레포 연결 후 채워주세요
giscus:
  repo: "KSY1526/project_b"
  repo_id: "REPO_ID_HERE"
  category: "Comments"
  category_id: "CATEGORY_ID_HERE"
  mapping: "pathname"
  theme: "light"
  lang: "ko"
